name: nexthome
description: Next Home – Rental Platform Flutter App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^14.1.4

  # ── Networking ────────────────────────────────────────────────────────────
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.4
  cloud_firestore: ^5.0.2  # For real-time features if needed

  # ── Maps ──────────────────────────────────────────────────────────────────
  google_maps_flutter: ^2.7.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # ── Payments ──────────────────────────────────────────────────────────────
  razorpay_flutter: ^1.3.6
  flutter_stripe: ^10.1.1

  # ── Real-time Chat ────────────────────────────────────────────────────────
  socket_io_client: ^2.0.3+1

  # ── Local Storage ─────────────────────────────────────────────────────────
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # ── UI Components ─────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  image_picker: ^1.1.2
  photo_view: ^0.15.0
  smooth_page_indicator: ^1.1.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1

  # ── Code Generation ───────────────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ── Utils ─────────────────────────────────────────────────────────────────
  dartz: ^0.10.1
  equatable: ^2.0.5
  get_it: ^7.7.0          # Service locator (optional alongside Riverpod)
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  google_sign_in: ^7.2.0
  google_places_flutter: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true
  generate: true  # Enable Flutter gen for l10n

  assets:
    - assets/images/
    - assets/images/hero_logo.png
    - assets/images/nexthomelogo.png
    - assets/icons/
    - assets/animations/
    - assets/config/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/hero_logo.png"
  image_path_ios: "assets/images/hero_logo_ios.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/hero_logo_android.png"
  min_sdk_android: 21
  remove_alpha_ios: true
