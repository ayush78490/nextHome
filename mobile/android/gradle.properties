org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Disable Kotlin incremental compilation — required when Flutter pub-cache is on a
# different Windows drive (C:\) than the project (D:\). Cross-drive relative paths
# cause the Kotlin daemon to crash with "different roots" AssertionError.
kotlin.incremental=false
