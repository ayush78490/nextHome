version: "3.9"

# ============================================================
# Next Home – Docker Compose (Production)
# Usage: docker compose -f docker-compose.prod.yml up -d
# ============================================================

networks:
  nexthome-prod:
    driver: bridge

volumes:
  oracle-prod-data:
    driver: local
  redis-prod-data:
    driver: local

services:

  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: nexthome-oracle-prod
    restart: always
    ports:
      - "127.0.0.1:1521:1521"   # Only bind to localhost in prod (behind reverse proxy)
    environment:
      ORACLE_PASSWORD: ${ORACLE_SYS_PASSWORD}
      APP_USER: ${ORACLE_APP_USER}
      APP_USER_PASSWORD: ${ORACLE_APP_PASSWORD}
      ORACLE_CHARACTERSET: AL32UTF8
    volumes:
      - oracle-prod-data:/opt/oracle/oradata
      - ./oracle/init:/container-entrypoint-initdb.d:ro
    networks:
      - nexthome-prod
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: nexthome-redis-prod
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1000
    volumes:
      - redis-prod-data:/data
    networks:
      - nexthome-prod

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
      target: production
    image: nexthome/backend:${VERSION:-latest}
    container_name: nexthome-backend-prod
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3000
      SOCKET_PORT: 3001
      ORACLE_HOST: oracle-db
      ORACLE_PORT: 1521
      ORACLE_SID: XEPDB1
      ORACLE_USER: ${ORACLE_APP_USER}
      ORACLE_PASSWORD: ${ORACLE_APP_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      LOG_LEVEL: info
    depends_on:
      - oracle-db
      - redis
    networks:
      - nexthome-prod
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nexthome-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - nexthome-prod
